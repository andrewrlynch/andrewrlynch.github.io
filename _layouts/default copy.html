<!DOCTYPE html>
<html>
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }}</title>
    {% include meta.html %}
  </head>

  <body>
    
    <div class="wrapper-masthead">
      <a href="{{ site.baseurl }}/" class="site-avatar"><img src="{{ site.avatar }}" /></a>
      <div class="container">
        <header class="masthead clearfix">
          <!--<div class="site-info">-->
            <!-- <p class="site-description">{{ site.description }}</p> -->
            <!--{% include svg-icons.html %}-->
          <!--</div>-->
          
          <h1 class="site-name"><a href="{{ site.baseurl }}/">{{ site.name }}</a></h1>
          <span class="nav">
            <a href="{{ site.baseurl }}/">About</a>
            <a href="{{ site.baseurl }}/pages/publications">Pubs</a>
            <a href="{{ site.baseurl }}/pages/projects">Projects</a>
            <a href="{{ site.baseurl }}/blog">Posts</a>
            <a href="{{ site.baseurl }}/pages/cv">CV</a>
            <a href="{{ site.baseurl }}/pages/panes">Panes</a>
          </span>
          
        </header>
      </div>
    </div>
    
    <div id="main" role="main" class="container">
      {{ content }}
    </div>
   
    {% include analytics.html %}
  </body>

  <script type='text/javascript' src='https://d1bxh8uas1mnw7.cloudfront.net/assets/embed.js'></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
  <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />
</html>
